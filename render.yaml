services:
  - type: web
    name: sharemeal-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm ci && npm run migrate-prod
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    healthCheckInterval: 10
    maxShutdownDelay: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: API_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SERVICE_TOKEN
        generateValue: true
      - key: MODEL_URL
        sync: false
      - key: MODEL_LOCAL_PATH
        value: /tmp/food_status_model.pkl
    plan: free
    numInstances: 1
