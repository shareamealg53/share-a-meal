name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
    
env:
  NODE_VERSION: 20

jobs:
  # Validate environment and secrets
  validate-env:
    name: Validate Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check required secrets
        run: |
          [ -n "$RENDER_SERVICE_ID" ] || { echo "❌ Missing RENDER_SERVICE_ID"; exit 1; }
          [ -n "$RENDER_DEPLOY_KEY" ] || { echo "❌ Missing RENDER_DEPLOY_KEY"; exit 1; }
          echo "✅ Required deploy secrets configured"
        env:
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          RENDER_DEPLOY_KEY: ${{ secrets.RENDER_DEPLOY_KEY }}

  # Backend Tests
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sharemeal_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Check for security vulnerabilities
        run: cd backend && npm audit --audit-level=high
        continue-on-error: true

      - name: Run database migrations
        run: cd backend && npm run migrate
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: sharemeal_test
          DB_PORT: 3306

      - name: Run tests with coverage
        run: cd backend && npm run test:coverage
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: sharemeal_test
          DB_PORT: 3306
          JWT_SECRET: test-jwt-secret
          ADMIN_SECRET: test-admin-secret

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # Frontend Tests
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run linter (ESLint)
        run: cd frontend && npm run lint

      - name: Run tests
        run: cd frontend && npm run test -- --run

      - name: Build for production
        run: cd frontend && npm run build

      - name: Check build output
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"
          ls -lh frontend/dist/

  # Backend Build Verification
  build-backend:
    name: Verify Backend Build
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install dependencies
        run: cd backend && npm ci --omit=dev

      - name: Verify backend can start
        run: |
          cd backend
          timeout 5 node src/app.js || EXIT_CODE=$?
          if [ $EXIT_CODE -eq 124 ] || [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Backend started successfully"
            exit 0
          else
            echo "❌ Backend failed to start (exit code: $EXIT_CODE)"
            exit 1
          fi
        env:
          NODE_ENV: production
          PORT: 3000

  # Code Quality Summary
  code-quality:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-backend]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-backend.result }}" != "success" ] || [ "${{ needs.test-frontend.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All tests passed"

      - name: Check build results
        run: |
          if [ "${{ needs.build-backend.result }}" != "success" ]; then
            echo "❌ Build verification failed"
            exit 1
          fi
          echo "✅ Build verified"

      - name: Summary
        run: |
          echo "🎯 Quality Gates Passed:"
          echo "  ✅ Backend tests"
          echo "  ✅ Frontend tests"
          echo "  ✅ Frontend build"
          echo "  ✅ Backend build verification"

  # Deploy to Render (only on main branch push)
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [code-quality, validate-env]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pre-deployment health check
        run: |
          echo "🔍 Checking current deployment..."
          curl -s https://shareameal-api.onrender.com/health || echo "ℹ️ Current deployment not accessible (may be starting)"

      - name: Trigger Render Deploy
        id: render_deploy
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -X POST \
            --url "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}" \
            --header 'accept: application/json' \
            -w "\n%{http_code}" \
            -s)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Deploy request accepted"
            echo "response=$BODY" >> $GITHUB_OUTPUT
          else
            echo "❌ Deploy request failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting for deployment to start (30 seconds)..."
          sleep 30
          echo "ℹ️ Deployment should be in progress"

      - name: Post-deployment health check
        run: |
          echo "🔍 Checking deployment health..."
          MAX_ATTEMPTS=12
          ATTEMPT=0
          HEALTH_CHECK_URL="https://shareameal-api.onrender.com/health"
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_CHECK_URL" || echo "000")
            
            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "✅ Backend health check passed"
              exit 0
            else
              echo "  Status: HTTP $HTTP_CODE (waiting...)"
              sleep 10
            fi
          done
          
          echo "⚠️ Health check timeout (deployment may still be in progress)"
          echo "Monitor: https://dashboard.render.com/services/${{ secrets.RENDER_SERVICE_ID }}"
          exit 1

  # Final Status Report
  deployment-status:
    name: Deployment Status Report
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment Success
        if: needs.deploy-backend.result == 'success'
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo ""
          echo "📊 Pipeline Summary:"
          echo "  ✅ Backend Quality Checks"
          echo "  ✅ Frontend Quality Checks"
          echo "  ✅ Build Verification"
          echo "  ✅ Backend Deployed to Render"
          echo "  ✅ Post-Deployment Health Check"
          echo ""
          echo "🎯 Services Status:"
          echo "  Backend: https://shareameal-api.onrender.com"
          echo "  Frontend: https://share-a-meal-1p8k.vercel.app"
          echo "  Swagger Docs: https://shareameal-api.onrender.com/api-docs"
          echo ""
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"

      - name: Deployment Failure
        if: needs.deploy-backend.result == 'failure'
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo ""
          echo "🔧 Troubleshooting:"
          echo "  1. Check Render dashboard: https://dashboard.render.com"
          echo "  2. Review workflow logs above"
          echo "  3. Verify environment variables in Render"
          echo ""
          echo "📝 Commit: ${{ github.sha }}"
          echo "👤 Author: ${{ github.actor }}"
          exit 1

      - name: Deployment Skipped (PR)
        if: github.event_name == 'pull_request'
        run: |
          echo "ℹ️ DEPLOYMENT SKIPPED (Pull Request)"
          echo ""
          echo "✅ Quality checks passed for PR"
          echo "📝 This will deploy after merge to main"
